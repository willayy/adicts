name: adicts-CICD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-if-version-is-updated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.14
      - run: |
          # Get current version from pyproject.toml
          CURRENT_VERSION=$(grep -m 1 '^version = ' pyproject.toml | cut -d '"' -f 2)

          # Get the latest tag from the repository
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0")

          echo "Current version: $CURRENT_VERSION"
          echo "Latest tag: $LATEST_TAG"

          # Compare versions
          if [ "$CURRENT_VERSION" = "$LATEST_TAG" ]; then
            echo "Error: Version in pyproject.toml ($CURRENT_VERSION) has not been updated."
            exit 1
          fi

  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v3 # Check out code
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -r requirements.txt
      - run: pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.14
      - run: pip install -r requirements.txt pylint
      - run: pylint adicts/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.14
      - run: pip install -r requirements.txt pyright
      - run: pyright adicts/

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.14
      - run: pip install black
      - run: black --check --target-version=py314 adicts/

  gh-release:
    needs: [build-test, lint, type-check, format]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: google-github-actions/release-please-action@v4
        with:
          release-type: python

  pypi-publish:
    needs: [gh-release]
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/adicts
    permissions:
      id-token: write # This is required for trusted publishing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependencies
        run: python -m pip install --upgrade pip build
      - name: Build package
        run: python -m build
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
